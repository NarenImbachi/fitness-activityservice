spring:
  application:
    name: activityservice

  data:
    mongodb:
      #uri: ${MONGODB_URI:mongodb://localhost:27017/fitnessactivity}
      uri: ${MONGODB_URI:mongodb://root:root@localhost:27017/?authSource=admin}
      database: fitnessactivity

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true  
      
server:
  port: ${PORT:8082}